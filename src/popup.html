<!DOCTYPE html>
<html id="popup">
	<head>
		<title>Nugget</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="style.css">
		<script src="browser-polyfill.min.js"></script>
	</head>
	<body id="popup-container">
		<main class="nugget-popup">
			<header class="nugget-header">
				<h1>Nugget</h1>
				<p>Capture selected AI conversation snippets into Obsidian.</p>
			</header>

			<section class="nugget-section">
				<div id="snippet-count" class="nugget-count">0 snippets collected</div>
				<ul id="snippet-list" class="snippet-list"></ul>
				<button id="capture-selection" class="mod-cta">Capture selection</button>
			</section>

			<section class="nugget-section">
				<label for="destination-vault">Vault</label>
				<input id="destination-vault" type="text" placeholder="Default vault">

				<label for="destination-path">Note path</label>
				<input id="destination-path" type="text" placeholder="Nuggets/Inbox">

				<label for="destination-behavior">Destination behavior</label>
				<select id="destination-behavior">
					<option value="append">Append to note</option>
					<option value="create">Create note</option>
				</select>
			</section>

			<footer class="nugget-actions">
				<button id="export-snippets" class="mod-cta">Send to Obsidian</button>
				<button id="clear-snippets">Clear</button>
				<div id="nugget-status" role="status"></div>
			</footer>
		</main>
		<script type="module" src="popup.js"></script>
	</body>
</html>
